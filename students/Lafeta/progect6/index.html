<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Адаптивний дизайн</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f0f0f0;
}

/* HEADER */

header{
    background:#3498db;
    color:white;
    text-align:center;
    padding:25px;
    font-size:24px;
}

/* MAIN LAYOUT */

.container{
    display:flex;
    min-height:400px;
}

/* NAVIGATION */

nav{
    background:#2ecc71;
    width:20%;
    padding:20px;
    text-align:center;
    font-size:20px;
}

/* MAIN CONTENT */

main{
    background:#dcdcdc;
    width:60%;
    padding:20px;
    text-align:center;
    font-size:22px;
}

/* SIDEBAR */

aside{
    background:#9b59b6;
    width:20%;
    padding:20px;
    text-align:center;
    color:white;
    font-size:20px;
}

/* FOOTER */

footer{
    background:#34495e;
    color:white;
    text-align:center;
    padding:25px;
    font-size:22px;
}

/* ========================= */
/* Планшет */
/* ========================= */

@media (max-width: 992px){

    nav{
        width:25%;
    }

    main{
        width:50%;
    }

    aside{
        width:25%;
    }
}

/* ========================= */
/* Телефон */
/* ========================= */

@media (max-width: 768px){

    .container{
        flex-direction:column;
    }

    nav,
    main,
    aside{
        width:100%;
        min-height:120px;
    }

    header,
    footer{
        font-size:20px;
    }
}

</style>
</head>

<body>

<header>
    Header
</header>

<div class="container">

    <nav>
        Navigation
    </nav>

    <main>
        Main Content
    </main>

    <aside>
        Sidebar
    </aside>

</div>

<footer>
    Footer
</footer>

</body>
</html>
