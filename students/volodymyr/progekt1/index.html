<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практика: Box Model</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Практична робота: Box Model</h1>
        
        <div class="boxes">
            <!-- Блок 1 -->
            <div class="box box1">
                Блок 1
                <div class="label"> (margin: 10px 30px) </div>
            </div>

            <!-- Блок 2 -->
            <div class="box box2">
                Блок 2
                <div class="label"> (padding: 5px 15px 10px 20px) </div>
            </div>

            <!-- Блок 3 -->
            <div class="box box3">
                Блок 3
                <div class="label"> (border: 3px dashed) </div>
            </div>

            <!-- Блок 4 -->
            <div class="box box4">
                Блок 4
                <div class="label"> (додаткове завдання) </div>
            </div>
        </div>
    </div>
</body>
</html>
