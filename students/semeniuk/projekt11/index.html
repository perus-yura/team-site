<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>форма зворотнього звязку</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>Звяжіться з нами</h1>
        <form id="headbackForm">
        </form>
    </div>
    <script src="script.js"></script>
    <div class="form-group">
        <label for="name">Ваше Імя:</label>
        <input type="text" id="name" name="name" required>
        <span class="error" id="nameError"></span>
    </div>

    <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="emil" name="email" required>
        <span class="error" id="emailError"></span>
    </div>

    <div class="form-group">
        <label for="subject">Тема:</label>
        <select id="subject" name="subject">
            <option value="question">Запитання</option>
            <option value="feedback">Відгук</option>
            <option value="complaint">Скарга</option>
        </select>
    </div>

    <div class="form-group">
        <label for="message">Повідомлення:</label>
        <textarea id="message" name="message" rows="5" required></textarea>
        <span class="error" id="messageError"></span>
    </div>
    <button type="submit">Надіслати</button>
</body>

</html>
