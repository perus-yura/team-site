<html lang="uk">
<head>

    <title>Flexbox Галерея</title>
    <link rel="stylesheet" href="flex-galery.css">
</head>
<body>
    <h1>Галерея (Flexbox)</h1>
    <div class="flex-galery">
        <img src="Природа.jpg" alt="Природа">
        <img src="Місто.jpg" alt="Місто">
        <img src="Архітектура.jpg" alt="Архітектура">
        </div>
    <div class="grid-galery">
        <img src="Природа2.jpg" alt="Природа">

        </div>  
        <div class="combo-gallery">
            <div class="gallery-item">
                <img src="Природа3.jpg" alt="Природа">

                </div>
                </div>
</body>
